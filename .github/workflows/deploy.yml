name: Deploy to GitHub Pages

on:
  # 当代码推送到 main 分支时自动触发构建
  push:
    branches: ["main"]
  # 允许在 GitHub 网页上手动点击按钮触发构建
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，允许 Action 部署页面
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许同时进行一次部署，避免冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 推荐使用较新的 LTS 版本
          cache: 'npm'       # 如果你用 pnpm 或 yarn，可修改为对应的包管理器

      - name: Install dependencies
        run: npm install

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Build the static site
        # 这里的命令会把你的 Markdown/MDX 编译成纯静态文件
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 【注意】修改这里的路径为你框架默认输出的静态文件目录：
          # Astro 通常是 './dist'
          # Next.js 通常是 './out'
          # Docusaurus 通常是 './build'
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4